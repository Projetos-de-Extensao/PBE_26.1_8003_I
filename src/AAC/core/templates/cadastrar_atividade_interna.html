{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Atividade Interna</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>

<header class="header">
    <div class="header-left">
        <img src="{% static 'img/logo_ibmec.png' %}" alt="IBMEC">
        <h1>Cadastrar Atividade Interna</h1>
    </div>

    <a href="{% url voltar_url %}" class="logout">Voltar</a>
</header>

<main class="container">
    <div class="section">
        <h2>Nova Atividade Interna - {{ tipo_usuario }}</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Descrição</label>
                <input type="text" name="descricao" required>
            </div>

            <div class="form-group">
                <label>Carga horária</label>
                <input type="number" name="carga_horaria_solicitada" required>
            </div>

            <div class="form-group">
                <label>Tipo de atividade</label>
                <select name="tipo_atividade" required>
                    <option value="">Selecione</option>

                    {% for tipo in tipos_atividade %}
                        <option value="{{ tipo.id }}">
                            {{ tipo.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn">
                Cadastrar Atividade
            </button>
        </form>
    </div>
</main>

</body>
</html>
